name: Build & Release APK

permissions:
  contents: write

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/PlantCare.apk || mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/PlantCare.apk || true

      - name: Get version from build.gradle
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*versionName = "\(.*?)".*/\1/' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: PlantCare v${{ steps.version.outputs.version }}
          files: app/build/outputs/apk/release/PlantCare.apk
          body: |
            ## PlantCare v${{ steps.version.outputs.version }}

            🌿 Smart plant care for your garden

            ### Download
            - [PlantCare.apk](https://github.com/jnetai-clawbot/PlantCare/releases/download/v${{ steps.version.outputs.version }}/PlantCare.apk)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}